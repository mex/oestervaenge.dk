    - Priser Kastrupvej: "https://www.boliga.dk/salg/resultater?so=1&sort=omregnings_dato-d&maxsaledate=today&iPostnr=2300&gade=Kastrupvej&minsaledate=1992&searchTab=1"
    - Priser Korinthvej: "https://www.boliga.dk/salg/resultater?so=1&sort=omregnings_dato-d&maxsaledate=today&iPostnr=2300&gade=Korinthvej&minsaledate=1992&searchTab=1"
    - Priser Milosvej: "https://www.boliga.dk/salg/resultater?so=1&sort=omregnings_dato-d&maxsaledate=today&iPostnr=2300&gade=Milosvej&minsaledate=1992&searchTab=1"
    - Priser Parosvej: "https://www.boliga.dk/salg/resultater?so=1&sort=omregnings_dato-d&maxsaledate=today&iPostnr=2300&gade=Parosvej&minsaledate=1992&searchTab=1"
